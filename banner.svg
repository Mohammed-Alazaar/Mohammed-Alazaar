<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mohammed Alazaar — Software engineer and performance marketer. Growth strategy meets engineering execution.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B0B0D"/>
      <stop offset="1" stop-color="#050506"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.9" r="0.65">
      <stop offset="0" stop-color="#2ECA8B" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#2ECA8B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2ECA8B" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#2ECA8B" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#2ECA8B" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="sparkFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2ECA8B" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#2ECA8B" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#2ECA8B" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- base -->
  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#dots)"/>
  <rect width="1200" height="300" fill="url(#glow)"/>

  <!-- build -> grow sparkline (fades in from the left, rises to the right) -->
  <path d="M 0 252 L 150 246 L 300 252 L 430 236 L 560 242 L 690 210 L 820 220 L 950 164 L 1080 150 L 1200 92 L 1200 300 L 0 300 Z" fill="url(#sparkFill)"/>
  <path d="M 0 252 L 150 246 L 300 252 L 430 236 L 560 242 L 690 210 L 820 220 L 950 164 L 1080 150 L 1200 92" fill="none" stroke="url(#spark)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="1170" cy="103" r="9" fill="#2ECA8B" opacity="0.25"/>
  <circle cx="1170" cy="103" r="4.5" fill="#2ECA8B"/>

  <!-- terminal-cursor marker -->
  <rect x="46" y="72" width="9" height="9" rx="1.5" fill="#2ECA8B"/>

  <!-- top label -->
  <text x="66" y="82" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="15" letter-spacing="2" fill="#7D8590">software engineer  &#215;  performance marketing</text>

  <!-- name -->
  <text x="44" y="152" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="62" font-weight="800" letter-spacing="0.5" fill="#F5F5F7">Mohammed Alazaar</text>

  <!-- tagline -->
  <text x="46" y="202" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="26" font-weight="600" fill="#2ECA8B">Growth strategy meets engineering execution.</text>

  <!-- sub -->
  <text x="47" y="234" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" fill="#9BA1A6">I build the product — then I make people find it.</text>

  <!-- meta -->
  <text x="47" y="274" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="13" letter-spacing="1" fill="#5A6169">Ankara, T&#252;rkiye   &#183;   open to roles across Europe   &#183;   AR &#183; TR &#183; EN &#183; DE</text>
</svg>
